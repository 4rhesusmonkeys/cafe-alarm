# cafe-alarm<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Alarm - Antirrobo Web</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --primary: #ef4444;
            --success: #22c55e;
            --text: #f8fafc;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .container {
            max-width: 400px;
            width: 100%;
        }
        h1 { font-size: 2rem; margin-bottom: 5px; }
        p { color: #94a3b8; margin-bottom: 30px; }
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3);
            transition: transform 0.2s;
            width: 100%;
        }
        .btn:active { transform: scale(0.98); }
        .btn.active { background-color: var(--success); box-shadow: 0 10px 25px rgba(34, 197, 94, 0.3); }
        #status { font-size: 1.2rem; margin-top: 20px; font-weight: bold; min-height: 30px; }
        .footer { margin-top: 50px; font-size: 0.9rem; color: #64748b; }
        .footer a { color: #38bdf8; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>☕ Café Alarm</h1>
        <p>Coloca el móvil sobre tu portátil y activa la alarma antes de ir al baño.</p>

        <button id="alarmBtn" class="btn" onclick="startProcess()">ACTIVAR ALARMA</button>
        <div id="status">Listo para proteger</div>

        <!-- Enlace de donación gratuito -->
        <div class="footer">
            ¿Te he salvado el portátil? <br>
            <a href="https://ko-fi.com/TUNOMBRE" target="_blank">☕ Invítame a un café</a>
        </div>
    </div>

    <!-- Audio de la alarma (usamos un sonido público online para no complicar) -->
    <audio id="alarmAudio" loop preload="auto">
        <source src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" type="audio/ogg">
    </audio>

    <script>
        let isArmed = false;
        let isTriggered = false;
        let lastX, lastY, lastZ;
        const SENSITIVITY = 12; // Ajusta este número si es muy sensible o poco sensible
        
        const btn = document.getElementById('alarmBtn');
        const statusDiv = document.getElementById('status');
        const audio = document.getElementById('alarmAudio');

        function startProcess() {
            if (!isArmed && !isTriggered) {
                // Solicitar permisos de sensores en iOS (Apple los requiere explícitamente)
                if (typeof DeviceMotionEvent.requestPermission === 'function') {
                    DeviceMotionEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') {
                                armAlarm();
                            } else {
                                alert('Necesitamos permisos de movimiento para funcionar.');
                            }
                        })
                        .catch(console.error);
                } else {
                    // Android y navegadores de escritorio
                    armAlarm();
                }
            } else {
                disarmAlarm();
            }
        }

        function armAlarm() {
            let countdown = 5;
            btn.disabled = true;
            
            let interval = setInterval(() => {
                statusDiv.innerText = `Armando en ${countdown}... ¡No muevas el móvil!`;
                countdown--;
                if (countdown < 0) {
                    clearInterval(interval);
                    isArmed = true;
                    btn.disabled = false;
                    btn.innerText = "DESACTIVAR";
                    btn.classList.add('active');
                    statusDiv.innerText = "🔒 SENSOR ACTIVO. Si se mueve, sonará.";
                    
                    // Registrar la primera posición estable
                    window.addEventListener('devicemotion', handleMotion);
                }
            }, 1000);
        }

        function handleMotion(event) {
            if (!isArmed) return;

            let acceleration = event.accelerationIncludingGravity;
            let x = acceleration.x;
            let y = acceleration.y;
            let z = acceleration.z;

            if (lastX !== undefined) {
                let deltaX = Math.abs(x - lastX);
                let deltaY = Math.abs(y - lastY);
                let deltaZ = Math.abs(z - lastZ);

                // Si el movimiento supera el umbral de sensibilidad
                if (deltaX > SENSITIVITY || deltaY > SENSITIVITY || deltaZ > SENSITIVITY) {
                    triggerAlarm();
                }
            }

            lastX = x;
            lastY = y;
            lastZ = z;
        }

        function triggerAlarm() {
            isTriggered = true;
            isArmed = false;
            statusDiv.innerText = "🚨 ¡INTRUSO DETECTADO! 🚨";
            document.body.style.backgroundColor = "#7f1d1d"; // Fondo rojo parpadeante visual
            audio.play().catch(e => console.log("Error al reproducir audio:", e));
        }

        function disarmAlarm() {
            let pin = prompt("Introduce el PIN para desactivar (Por defecto: 1234):");
            if (pin === "1234") {
                isArmed = false;
                isTriggered = false;
                window.removeEventListener('devicemotion', handleMotion);
                audio.pause();
                audio.currentTime = 0;
                document.body.style.backgroundColor = "#0f172a";
                btn.innerText = "ACTIVAR ALARMA";
                btn.classList.remove('active');
                statusDiv.innerText = "Listo para proteger";
                lastX = lastY = lastZ = undefined;
            } else {
                alert("PIN incorrecto. ¡La alarma sigue activa!");
            }
        }
    </script>
</body>
</html>
